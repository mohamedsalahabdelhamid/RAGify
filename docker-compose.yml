services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragify-backend
    ports:
      - "9999:9999"
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GROQ_API_KEY=${GROQ_API_KEY}
      - FRONTEND_URL=*
    volumes:
      - ragify_data:/home/user/app/data
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragify-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:9999
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  ragify_data:
