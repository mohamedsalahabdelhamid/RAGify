services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ragify-backend
    ports:
      - "9999:9999"
    env_file:
      - .env                             # reads GEMINI_API_KEY and GROQ_API_KEY
    volumes:
      - ragify_vectorstore:/home/user/app/vectorstore
      - ragify_data:/home/user/app/data  # persists files_registry.json
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9999/"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 20s
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ragify-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:9999
      - NODE_ENV=production
    depends_on:
      backend:
        condition: service_healthy        # waits for backend to pass health check
    restart: unless-stopped

volumes:
  ragify_vectorstore:
  ragify_data:
